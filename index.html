<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAVIDPSD ADVERTISING - Kalkulator Banner</title>
<style>
body{font-family:'Segoe UI',Arial;background:linear-gradient(135deg,#1e3c72,#2a5298);padding:20px;margin:0}
.container{max-width:1000px;margin:auto;background:#fff;padding:25px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.2)}
h2{text-align:center;color:#1e3c72;margin-bottom:20px}
input,select{width:100%;padding:12px;margin:6px 0;border:1px solid #ddd;border-radius:8px;font-size:16px}
button{padding:12px 15px;margin:4px;border:none;background:#2a5298;color:#fff;border-radius:8px;cursor:pointer;font-size:16px}
.row{display:flex;gap:10px;margin-bottom:10px}
.row input:nth-child(1){flex:3}
.row input:nth-child(2){flex:3}
.row input:nth-child(3){flex:2}
.row button{background:#e74c3c}
.result{background:#f8f9fa;color:#000;padding:15px;margin-top:15px;border:1px solid #ccc;border-radius:10px;overflow:auto}
pre{font-family:monospace;white-space:pre-wrap;font-size:14px}
.status{margin:10px 0;padding:8px;border-radius:6px;font-size:14px}
.success{background:#d4edda;color:#155724}
.error{background:#f8d7da;color:#721c24}
@media print{body *{visibility:hidden}#hasil,#hasil *{visibility:visible}#hasil{position:absolute;top:0;left:0;width:100%}}
</style>
</head>
<body>
<div class="container">
<h2>DAVIDPSD ADVERTISING</h2>
<p style="text-align:center;color:#555">Kalkulator Harga Banner & Item</p>

<input id="nama" placeholder="Nama Pemesan">
<input id="dp" type="number" placeholder="DP (Rp)">

<select id="pembulatan">
<option value="0.5">Pembulatan 0.5 meter</option>
<option value="1">Pembulatan 1 meter</option>
<option value="real">Tanpa pembulatan (real)</option>
</select>

<select id="harga">
<option value="30000">Umum - Rp 30.000 /m²</option>
<option value="25000">Reseller - Rp 25.000 /m²</option>
</select>

<div id="bannerList"></div>
<button onclick="tambahBanner()">+ Tambah Banner</button>

<div id="itemList"></div>
<button onclick="tambahItem()">+ Tambah Item Lain</button>

<div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:20px">
<button onclick="hitung()">🧮 Hitung & Simpan</button>
<button onclick="toggleRiwayat()">📋 Riwayat Lokal</button>
<button onclick="exportRiwayat()">📤 Export Riwayat</button>
<button onclick="importRiwayat()">📥 Import Riwayat</button>
<button onclick="hapusSemuaRiwayat()">🗑 Hapus Riwayat Lokal</button>
<button onclick="mulaiBaru()">🔄 Mulai Baru</button>
<button onclick="window.print()">🖨 Print Struk</button>
<button onclick="kirimWA()">📲 Kirim ke WA</button>
</div>

<div id="hasil" class="result"></div>
<div id="status" class="status"></div>
</div>

<script>
// ================== KONFIGURASI GOOGLE SHEET ==================
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyB6q0w2TRijFy0LAbEgTv19aD9mXgtuuQZ0ss0dTVAjDW-8oQ7b0Hysg9g4x9GUjPC/exec";  
// GANTI DENGAN URL KAMU (yang kamu copy tadi)

// ============================================================

let namaEl = document.getElementById('nama');
let dpEl = document.getElementById('dp');
let hasil = document.getElementById('hasil');
let statusEl = document.getElementById('status');
let bannerList = document.getElementById('bannerList');
let itemList = document.getElementById('itemList');
let pembulatan = document.getElementById('pembulatan');

function tambahBanner(){
 let d = document.createElement('div');
 d.className = 'row';
 d.innerHTML = `<input placeholder='Panjang (cm)'><input placeholder='Lebar (cm)'><input placeholder='Qty' type='number'><button onclick='this.parentElement.remove()'>✖</button>`;
 bannerList.appendChild(d);
}

function tambahItem(){
 let d = document.createElement('div');
 d.className = 'row';
 d.innerHTML = `<input placeholder='Nama Item'><input placeholder='Harga (Rp)' type='number'><input placeholder='Qty' type='number'><button onclick='this.parentElement.remove()'>✖</button>`;
 itemList.appendChild(d);
}

function bulatMeter(cm, mode){
 let m = cm / 100;
 if(mode === 'real') return m;
 if(mode === '1') return Math.ceil(m);
 return Math.ceil(m * 2) / 2;
}

function formatRp(a){ 
 return Number(a).toLocaleString('id-ID');
}

function getNextInvoice(){
 let no = localStorage.getItem('noInvoice') || 1;
 localStorage.setItem('noInvoice', parseInt(no) + 1);
 return 'INV-' + String(no).padStart(4, '0');
}

async function kirimKeGoogleSheet(data) {
  try {
    const response = await fetch(GOOGLE_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(data),
      headers: { "Content-Type": "application/json" }
    });
    
    const result = await response.json();
    if (result.status === "success") {
      statusEl.innerHTML = `<span class="success">✅ Data berhasil disimpan ke Google Sheet</span>`;
      setTimeout(() => statusEl.innerHTML = '', 4000);
    }
  } catch (err) {
    console.error("Gagal kirim ke Sheet:", err);
    // Tidak mengganggu user
  }
}

function hitung(){
 let mode = pembulatan.value;
 let harga = parseInt(document.getElementById('harga').value);
 let total = 0;
 let detailBanner = '';
 let detailItem = '';

 // Banner
 document.querySelectorAll('#bannerList .row').forEach(r => {
  let p = r.children[0].value;
  let l = r.children[1].value;
  let q = parseFloat(r.children[2].value) || 1;
  if(p && l){
   let pm = bulatMeter(parseFloat(p), mode);
   let lm = bulatMeter(parseFloat(l), mode);
   let sub = pm * lm * harga * q;
   total += sub;
   detailBanner += `${p}×${l}cm → ${pm}×${lm}m ×${q} = Rp ${formatRp(sub)}\n`;
  }
 });

 // Item tambahan
 document.querySelectorAll('#itemList .row').forEach(r => {
  let nama = r.children[0].value || "Item";
  let hrg = parseFloat(r.children[1].value) || 0;
  let qty = parseFloat(r.children[2].value) || 1;
  if(hrg > 0){
   let sub = hrg * qty;
   total += sub;
   detailItem += `${nama} ×${qty} = Rp ${formatRp(sub)}\n`;
  }
 });

 let dp = parseInt(dpEl.value) || 0;
 let sisa = total - dp;
 let nama = namaEl.value || '-';
 let invoice = getNextInvoice();
 let tanggal = new Date().toLocaleString('id-ID', {timeZone: 'Asia/Jakarta'});

 let struk = `========================================
DAVIDPSD ADVERTISING (0822-5658-4946)
STRUK PEMBAYARAN
========================================
Nama     : ${nama}
Tanggal  : ${tanggal}
Invoice  : ${invoice}
----------------------------------------
BANNER
${detailBanner}
----------------------------------------
ITEM TAMBAHAN
${detailItem}
----------------------------------------
TOTAL    : Rp ${formatRp(total)}
DP       : Rp ${formatRp(dp)}
SISA     : Rp ${formatRp(sisa)}
========================================

PEMBAYARAN A/N ABDUL DAVID
BRI     : 343101037462534
BSI     : 7350269864
DANA    : 083150007184

Terima kasih atas kepercayaannya!
========================================`;

 // Simpan ke localStorage (backup)
 let dataRiwayat = JSON.parse(localStorage.getItem('riwayat') || '[]');
 dataRiwayat.unshift({invoice, nama, total, dp, sisa, struk, tanggal});
 localStorage.setItem('riwayat', JSON.stringify(dataRiwayat));

 // Kirim ke Google Sheet
 const sheetData = {
   invoice: invoice,
   tanggal: tanggal,
   nama: nama,
   total: total,
   dp: dp,
   sisa: sisa,
   detailBanner: detailBanner.trim(),
   detailItem: detailItem.trim(),
   struk: struk
 };

 kirimKeGoogleSheet(sheetData);

 // Tampilkan struk
 hasil.innerHTML = `<pre>${struk}</pre>`;
}

function toggleRiwayat(){
 let d = JSON.parse(localStorage.getItem('riwayat') || '[]');
 if(d.length === 0){
  hasil.innerHTML = '<pre>Tidak ada riwayat lokal</pre>';
  return;
 }
 let teks = d.map((x,i) => `==============================\nRiwayat ${i+1} - ${x.invoice}\n${x.struk}\n==============================`).join("\n\n");
 hasil.innerHTML = `<pre>${teks}</pre>`;
}

function exportRiwayat(){
 let data = localStorage.getItem('riwayat');
 if(!data) { alert('Tidak ada riwayat'); return; }
 const blob = new Blob([data], {type: 'application/json'});
 const url = URL.createObjectURL(blob);
 const a = document.createElement('a');
 a.href = url;
 a.download = `riwayat-banner-${new Date().toISOString().slice(0,10)}.json`;
 a.click();
}

function importRiwayat(){
 let input = document.createElement('input');
 input.type = 'file';
 input.accept = '.json';
 input.onchange = e => {
  let file = e.target.files[0];
  let reader = new FileReader();
  reader.onload = ev => {
   localStorage.setItem('riwayat', ev.target.result);
   alert('Riwayat berhasil diimport!');
  };
  reader.readAsText(file);
 };
 input.click();
}

function hapusSemuaRiwayat(){
 if(confirm('Yakin hapus SEMUA riwayat lokal?')) {
  localStorage.removeItem('riwayat');
  hasil.innerHTML = '<pre>Riwayat lokal telah dihapus</pre>';
 }
}

function mulaiBaru(){
 namaEl.value = '';
 dpEl.value = '';
 bannerList.innerHTML = '';
 itemList.innerHTML = '';
 hasil.innerHTML = '';
 tambahBanner();
 tambahItem();
}

function kirimWA(){
 let text = hasil.innerText || hasil.textContent;
 if(!text){ alert('Hitung dulu'); return; }
 let url = `https://wa.me/?text=${encodeURIComponent(text)}`;
 window.open(url, '_blank');
}

window.onload = () => {
 tambahBanner();
 tambahItem();
};
</script>
</body>
</html>
